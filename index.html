<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Личный сайт — Начинающий разработчик</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <section class="hero">
    <!-- Динамический фон: градиент + орбы + движущиеся элементы + курсор -->
    <div class="hero__bg" aria-hidden="true">
      <div class="hero__cursor-glow" aria-hidden="true"></div>
      <div class="hero__orb-wrap hero__orb-wrap--1">
        <span class="hero__orb hero__orb--1"></span>
      </div>
      <div class="hero__orb-wrap hero__orb-wrap--2">
        <span class="hero__orb hero__orb--2"></span>
      </div>
      <!-- Вселенная: звёзды, туманности, движение -->
      <div class="hero__universe" aria-hidden="true">
        <div class="hero__stars">
          <span class="hero__star hero__star--s" data-i="1"></span>
          <span class="hero__star hero__star--s" data-i="2"></span>
          <span class="hero__star hero__star--s" data-i="3"></span>
          <span class="hero__star hero__star--s" data-i="4"></span>
          <span class="hero__star hero__star--s" data-i="5"></span>
          <span class="hero__star hero__star--m" data-i="6"></span>
          <span class="hero__star hero__star--m" data-i="7"></span>
          <span class="hero__star hero__star--m" data-i="8"></span>
          <span class="hero__star hero__star--m" data-i="9"></span>
          <span class="hero__star hero__star--l" data-i="10"></span>
          <span class="hero__star hero__star--l" data-i="11"></span>
          <span class="hero__star hero__star--l hero__star--drift" data-i="12"></span>
          <span class="hero__star hero__star--m hero__star--drift" data-i="13"></span>
          <span class="hero__star hero__star--s hero__star--drift" data-i="14"></span>
        </div>
        <div class="hero__nebula hero__nebula--1"></div>
        <div class="hero__nebula hero__nebula--2"></div>
        <div class="hero__nebula hero__nebula--3"></div>
      </div>
    </div>
    <div class="hero__content">
      <h1 class="hero__name">Клим Душкин</h1>
      <p class="hero__bio">
        FRONTEND разработчик. Изучаю веб-разработку и интересуюсь применением AI в создании продуктов.
      </p>
      <h2 class="hero__subtitle">Мой путь в IT + AI</h2>
      <a href="#skills" class="hero__cta">Мои навыки и уровень </a>
    </div>
  </section>

  <section class="skills" id="skills">
    <div class="skills__bg" aria-hidden="true">
      <div class="skills__universe">
        <span class="skills__star skills__star--s"></span>
        <span class="skills__star skills__star--s"></span>
        <span class="skills__star skills__star--m"></span>
        <span class="skills__star skills__star--m"></span>
        <span class="skills__star skills__star--l"></span>
        <span class="skills__star skills__star--l skills__star--drift"></span>
        <span class="skills__star skills__star--m skills__star--drift"></span>
      </div>
    </div>
    <div class="skills__content">
      <h2 class="skills__title">Мои навыки</h2>
      <div class="skills__grid" id="skills-grid"></div>
      <button type="button" class="skills__add-btn">Добавить навык</button>
    </div>
  </section>

  <section class="index" id="skill-index">
    <div class="index__bg" aria-hidden="true">
      <div class="index__universe">
        <span class="index__star index__star--s"></span>
        <span class="index__star index__star--s"></span>
        <span class="index__star index__star--m"></span>
        <span class="index__star index__star--m"></span>
        <span class="index__star index__star--l"></span>
        <span class="index__star index__star--l index__star--drift"></span>
        <span class="index__star index__star--m index__star--drift"></span>
      </div>
    </div>
    <div class="index__content index__content--scaled">
      <h2 class="index__title">Мой индекс навыков</h2>
      <div class="index__panel">
      <div class="index__row">
        <label class="index__label" for="index-html">HTML</label>
        <input type="range" id="index-html" class="index__range" min="0" max="100" value="0" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
        <output class="index__output" for="index-html" id="output-html">0</output>
      </div>
      <div class="index__row">
        <label class="index__label" for="index-css">CSS</label>
        <input type="range" id="index-css" class="index__range" min="0" max="100" value="0" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
        <output class="index__output" for="index-css" id="output-css">0</output>
      </div>
      <div class="index__row">
        <label class="index__label" for="index-js">JS</label>
        <input type="range" id="index-js" class="index__range" min="0" max="100" value="0" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
        <output class="index__output" for="index-js" id="output-js">0</output>
      </div>
      <div class="index__row">
        <label class="index__label" for="index-react">React / Vue</label>
        <input type="range" id="index-react" class="index__range" min="0" max="100" value="0" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
        <output class="index__output" for="index-react" id="output-react">0</output>
      </div>
      <div class="index__row">
        <label class="index__label" for="index-llm">LLM / Нейросети</label>
        <input type="range" id="index-llm" class="index__range" min="0" max="100" value="0" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
        <output class="index__output" for="index-llm" id="output-llm">0</output>
      </div>
      <div class="index__gauge-wrap">
        <div class="index__gauge-track">
          <div class="index__gauge-fill" id="index-gauge-fill" style="width: 0%"></div>
        </div>
        <p class="index__result">
          <span class="index__percent" id="index-percent">0</span>% — <span class="index__desc" id="index-desc">Начинающий, верный старт</span>
        </p>
      </div>
    </div>
    </div>
  </section>

  <section class="contact" id="contact">
    <div class="contact__content">
      <h2 class="contact__title">Связаться со мной</h2>
      <a class="contact__btn" href="https://t.me/YA_ODIN_K" target="_blank" rel="noopener noreferrer">
        <span class="contact__btn-icon" aria-hidden="true"></span>
        <span class="contact__btn-text">Связаться со мной в Telegram</span>
      </a>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
